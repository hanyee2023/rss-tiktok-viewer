<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST RSS</title>
<style>
body{background:#000;color:#fff;padding:10px}
.item{border:1px solid #333;padding:10px;margin:10px 0}
img{max-width:100%;height:auto}
</style>
</head>
<body>
<h2>测试RSS（不缓存、不过滤、全部显示）</h2>
<div id="out">加载中...</div>

<script>
// 1. 在这里直接写死你的RSS链接（方便测试）
const RSS_URL = "https://你的-rss-地址.xml"; // ← 改成你现在用的那个
const PROXY = "https://api.allorigins.win/raw?url=";

async function run(){
  const out = document.getElementById("out");
  try{
    const res = await fetch(PROXY + encodeURIComponent(RSS_URL),{
      signal:AbortSignal.timeout(8000)
    });
    const text = await res.text();
    console.log("RAW RSS:", text); // 打开控制台看原始内容

    const xml = new DOMParser().parseFromString(text,"text/xml");
    const items = [...xml.querySelectorAll("item,entry")];
    console.log("items数量:", items.length);

    if(items.length===0){
      out.innerHTML = "<h3>没有item → 源是空或被拦截</h3>";
      return;
    }

    let html = `<h3>共 ${items.length} 条</h3>`;
    items.forEach((it,i)=>{
      const title = it.querySelector("title")?.textContent || "无标题";
      const desc = it.querySelector("description,content\\:encoded")?.textContent || "";

      // 抓第一张图
      const m = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
      const img = m ? m[1] : "";

      html += `<div class="item">
        <b>${i+1}: ${title}</b><br>
        ${img ? `<img src="${img}">` : "<span style='color:red'>无图</span>"}
      </div>`;
    });
    out.innerHTML = html;

  }catch(e){
    out.innerHTML = "<h3>请求/解析失败</h3><p>"+e+"</p>";
    console.error(e);
  }
}
run();
</script>
</body>
</html>
