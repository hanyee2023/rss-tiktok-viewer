<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RSS 抖音阅读器</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body {background:#000;color:#fff}

/* 顶部栏 */
.top-bar {
position:fixed;top:0;left:0;width:100%;background:#111;padding:10px;z-index:999;
display:flex;gap:8px;align-items:center;overflow-x:auto
}
.btn {
background:#ff6a00;color:#fff;border:none;padding:6px 10px;border-radius:6px;
white-space:nowrap;cursor:pointer
}
.feed-item {
background:#222;padding:6px 10px;border-radius:6px;cursor:pointer
}
.feed-item.active {background:#ff6a00}

/* 滑动容器 */
.swiper {
margin-top:60px;height:calc(100vh - 60px);overflow-y:scroll;
scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch
}
.card {
width:100vw;height:calc(100vh - 60px);scroll-snap-align:start;
position:relative;display:flex;align-items:center;justify-content:center;
background:#000
}

/* 媒体全屏 */
.media {
width:100vw;height:100vh;object-fit:contain;background:#000
}
.carousel {
display:flex;width:100vw;height:100vh;overflow-x:scroll;scroll-snap-type:x mandatory}
.carousel-item {min-width:100vw;height:100vh;scroll-snap-align:start}

/* 标题 */
.title {
position:absolute;bottom:100px;left:10px;right:10px;background:#0008;padding:10px;
border-radius:8px;max-height:80px;overflow:hidden
}
.title.expand {max-height:none}
.toggle-title {color:#ff6a00;background:none;border:none;cursor:pointer}

/* 悬浮按钮 */
.actions {
position:absolute;right:10px;bottom:200px;display:flex;flex-direction:column;gap:12px
}
.action-btn {
width:44px;height:44px;border-radius:50%;background:#ff6a00;color:#fff;
border:none;display:flex;align-items:center;justify-content:center;cursor:pointer
}

/* 面板 */
.panel {
position:fixed;top:0;left:0;width:100%;height:100%;background:#000f;z-index:9999;
padding:20px;display:none
}
.panel.show {display:block}
input,textarea {width:100%;padding:10px;margin:6px 0;background:#222;color:#fff;border:none;border-radius:6px}
.feed-list {margin-top:10px;display:flex;flex-direction:column;gap:6px}
</style>
</head>
<body>

<div class="top-bar">
<button class="btn" onclick="showAll()">全部</button>
<button class="btn" onclick="showFeedManager()">订阅源</button>
<div id="feed-tabs"></div>
</div>

<div class="swiper" id="swiper"></div>

<div class="actions-fixed">
<button class="action-btn" onclick="showFavorites()">⭐</button>
</div>

<div class="panel" id="feed-panel">
<h3>订阅管理</h3>
<input id="feed-name" placeholder="名称">
<input id="feed-url" placeholder="RSS 地址">
<button class="btn" onclick="saveFeed()">保存</button>
<div class="feed-list" id="manage-list"></div>
<button class="btn" onclick="closePanel()">关闭</button>
</div>

<div class="panel" id="favorite-panel">
<h3>我的收藏</h3>
<div id="favorite-list"></div>
<button class="btn" onclick="closePanel()">关闭</button>
</div>

<script>
// ============== 存储 ==============
const STORE = {
get(k) {return JSON.parse(localStorage.getItem(k)||'[]')},
set(k,v) {localStorage.setItem(k,JSON.stringify(v))}
}

let feeds = STORE.get('feeds')
let read = STORE.get('read')
let fav = STORE.get('fav')
let currentFeed = 'all'

// ============== 订阅管理 ==============
function saveFeed() {
const name = document.getElementById('feed-name').value
const url = document.getElementById('feed-url').value
if (!name||!url) return
feeds = feeds.filter(f=>f.url!==url)
feeds.push({name,url})
STORE.set('feeds',feeds)
renderFeeds()
refresh()
closePanel()
}

function deleteFeed(url) {
feeds=feeds.filter(f=>f.url!==url)
STORE.set('feeds',feeds)
renderFeeds()
refresh()
}

function renderFeeds() {
const tab=document.getElementById('feed-tabs')
tab.innerHTML=''
feeds.forEach(f=>{
const el=document.createElement('div')
el.className='feed-item'+(currentFeed===f.url?' active':'')
el.innerText=f.name
el.onclick=()=>{currentFeed=f.url;renderFeeds();refresh()}
tab.appendChild(el)
})
}

// ============== 数据解析 ==============
async function loadAll() {
const items=[]
for (const f of feeds) {
try {
const res=await fetch(f.url)
const t=await res.text()
const doc=new DOMParser().parseFromString(t,'text/xml')
const nodes=Array.from(doc.querySelectorAll('item, entry'))
nodes.forEach(n=>{
const link = n.querySelector('link')?.href || n.querySelector('link')?.textContent || ''
const title = n.querySelector('title')?.textContent || ''
const desc = n.querySelector('description, content')?.textContent || ''
const imgs=Array.from(desc.matchAll(/src="(.*?)"/g)).map(i=>i[1])
items.push({feed:f.url,title,link,imgs})
})
} catch(e){}
}
return items
}

// ============== 界面渲染 ==============
async function refresh() {
const swiper=document.getElementById('swiper')
swiper.innerHTML='<div style="padding:40px">加载中...</div>'
const all=await loadAll()
const list=currentFeed==='all'?all:all.filter(i=>i.feed===currentFeed)
const unread=list.filter(i=>!read.includes(i.link))
swiper.innerHTML=''

unread.forEach(item=>{
const card=document.createElement('div')
card.className='card'
let media=''

if (item.imgs.length>1) {
media='<div class="carousel">'
item.imgs.forEach(u=>{media+=`<div class="carousel-item"><img src="${u}" class="media"></div>`})
media+='</div>'
} else if (item.imgs.length===1) {
media=`<img src="${item.imgs[0]}" class="media">`
} else {
media=`<iframe src="${item.link}" class="media" allowfullscreen></iframe>`
}

card.innerHTML=`
${media}
<div class="title" id="t-${item.link}">
${item.title}
<button class="toggle-title" onclick="toggleTitle('${item.link}')">展开</button>
</div>
<div class="actions">
<button class="action-btn" onclick="markRead('${item.link}')">✔</button>
<button class="action-btn" onclick="addFav('${item}')">⭐</button>
<button class="action-btn" onclick="downloadMedia('${item.imgs[0]||item.link}')">⬇</button>
</div>
`
swiper.appendChild(card)
})
}

// ============== 功能 ==============
function markRead(link) {
if (!read.includes(link)) read.push(link)
STORE.set('read',read)
refresh()
}
function addFav(item) {
if (!fav.some(x=>x.link===item.link)) fav.push(item)
STORE.set('fav',fav)
alert('已收藏')
}
function downloadMedia(url) {
const a=document.createElement('a')
a.href=url;a.download='';document.body.appendChild(a)
a.click();document.body.removeChild(a)
}
function toggleTitle(id) {
document.getElementById('t-'+id).classList.toggle('expand')
}
function showAll() {currentFeed='all';renderFeeds();refresh()}
function showFeedManager() {document.getElementById('feed-panel').classList.add('show')}
function showFavorites() {
const list=document.getElementById('favorite-list')
list.innerHTML=fav.map((i,k)=>`<div style="padding:10px;background:#222;margin:6px">${i.title}<br><button class="btn" onclick="delFav(${k})">删除</button></div>`).join('')
document.getElementById('favorite-panel').classList.add('show')
}
function delFav(k) {fav.splice(k,1);STORE.set('fav',fav);showFavorites()}
function closePanel() {document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'))}

window.onload=()=>{renderFeeds();refresh()}
</script>
</body>
</html>
