<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RSS 极速阅读器 V1.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#000;color:#fff}
.top-bar{
position:fixed;top:0;left:0;width:100%;background:#111;padding:10px;z-index:999;
display:flex;gap:8px;align-items:center;overflow-x:auto;white-space:nowrap;
box-shadow:0 2px 8px #0006
}
.btn{background:#ff6a00;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:bold;white-space:nowrap}
.btn.active{background:#ff9500}
.btn-single{background:#2288ff;font-size:11px;padding:4px 6px}
.badge{background:#fff;color:#ff6a00;font-size:12px;padding:2px 6px;border-radius:10px;min-width:20px;text-align:center}

.swiper{
margin-top:60px;height:calc(100vh - 60px);overflow-y:scroll;
scroll-snap-type:y mandatory;scroll-snap-stop:always;-webkit-overflow-scrolling:touch
}
.card{
width:100vw;height:calc(100vh - 60px);scroll-snap-align:start;position:relative;
display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden
}
.media{width:100vw;height:100vh;object-fit:contain;background:#000}

.img-wrap{
width:100vw;height:100vh;
display:flex;
overflow-x:auto;
overflow-y:hidden;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
}
.img-item{
flex:0 0 100vw;
height:100%;
display:flex;
align-items:center;
justify-content:center;
scroll-snap-align:center;
}
.img-item img{
max-width:100%;max-height:100%;object-fit:contain;
}

.title{
position:absolute;bottom:80px;left:10px;right:10px;background:rgba(0,0,0,.8);
padding:12px;border-radius:8px;font-size:14px;display:flex;gap:8px;align-items:center;
flex-direction:column;
}
.title-text{
width:100%;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:1;
-webkit-box-orient:vertical;
line-height:1.4;
}
.title-text.expanded{
display:block !important;
-webkit-line-clamp:unset;
white-space:normal;
}
.toggle-btn{color:#ff6a00;background:transparent;border:none;cursor:pointer;font-size:12px;align-self:flex-start}

.actions{position:absolute;right:14px;bottom:150px;display:flex;flex-direction:column;gap:14px}
.action-btn{width:46px;height:46px;border-radius:50%;background:#ff6a00;border:none;color:#fff;font-size:20px}

.panel{
position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;
display:none;
flex-direction:column;
padding:15px;
}
.panel.show{display:flex}
#favBox, #manageBox{flex:1;overflow-y:auto}
.panel-footer{margin-top:6px;}
.panel-footer .btn{width:100%;padding:7px 0;}

input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:8px;font-size:14px}
.feed-list{margin-top:14px;display:flex;flex-direction:column;gap:12px}
.feed-category{background:#ff6a00;padding:8px 12px;border-radius:8px;font-weight:bold;margin-bottom:6px}
.feed-item{background:#1a1a1a;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.feed-buttons{display:flex;gap:6px;flex-wrap:wrap}
.fav-item{background:#222;padding:12px;border-radius:8px;margin:8px 0}

.add-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  gap: 10px;
}
.add-buttons button {
  padding: 6px 14px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="top-bar">
  <button class="btn active" onclick="switchTab('img',this)">图片</button>
  <button class="btn" onclick="switchTab('video',this)">视频</button>
  <button class="btn" onclick="showAdd()">新建</button>
  <button class="btn" onclick="showManage()">管理</button>
  <button class="btn" onclick="showFav()">收藏</button>
</div>

<div class="swiper" id="wrap"></div>

<div class="panel" id="addPanel">
  <h3>新增订阅</h3>
  <input id="inName" placeholder="订阅名称">
  <input id="inUrl" placeholder="RSS链接">
  <select id="inType">
    <option value="img">图片源</option>
    <option value="video">视频源</option>
  </select>
  <div class="add-buttons">
    <button class="btn" onclick="saveAdd()">保存</button>
    <button class="btn" onclick="hideAllPanel()">关闭</button>
  </div>
</div>

<div class="panel" id="managePanel">
  <div id="manageBox"></div>
  <div class="panel-footer">
    <button class="btn" onclick="hideAllPanel()">关闭</button>
  </div>
</div>

<div class="panel" id="favPanel">
  <div id="favBox"></div>
  <div class="panel-footer">
    <button class="btn" onclick="hideAllPanel()">关闭</button>
  </div>
</div>

<script>
const PROXY = "https://corsproxy.io/?";
const RSS_CACHE = new Map();
const CACHE_TIME = 2*60*1000;
const STORE = {
  get(k){return JSON.parse(localStorage.getItem(k)||'[]')},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))}
}

let feeds = STORE.get('feeds');
let readList = STORE.get('read');
let favList = STORE.get('fav');
let allData = [];
let currFeed = 'all';
let currTab = 'img';
let nowIndex = 0;
let renderList = [];
let currVideo = null;
const wrap = document.getElementById('wrap');
let scrollLock = null;

window.onload = ()=>loadAllRss(true);

async function refreshSingleFeed(url){
  RSS_CACHE.delete(url);
  await loadAllRss(true);
  alert('已刷新');
}

function switchTab(t,dom){
  currTab = t;
  currFeed = 'all';
  document.querySelectorAll('.top-bar .btn').forEach(b=>b.classList.remove('active'));
  dom.classList.add('active');
  if(currVideo){currVideo.pause();currVideo=null;}
  renderPage();
}

function showAdd(){document.getElementById('addPanel').classList.add('show')}
function hideAllPanel(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'))}

function saveAdd(){
  const n = document.getElementById('inName').value.trim();
  const u = document.getElementById('inUrl').value.trim();
  const t = document.getElementById('inType').value;
  if(!n||!u)return alert('请填写完整');
  const idx = feeds.findIndex(i=>i.url===u);
  if(idx>-1) feeds[idx]={name:n,url:u,type:t};
  else feeds.push({name:n,url:u,type:t});
  STORE.set('feeds',feeds);
  hideAllPanel();
  loadAllRss(true);
}

function delFeed(url){
  readList = readList.filter(link=>{
    const d = allData.find(x=>x.link===link);
    return !(d&&d.source===url);
  })
  STORE.set('read',readList);
  feeds = feeds.filter(i=>i.url!==url);
  STORE.set('feeds',feeds);
  RSS_CACHE.delete(url);
  loadAllRss(true);
}

function setAllRead(url){
  allData.forEach(d=>{
    if(d.source===url&&!readList.includes(d.link)) readList.push(d.link);
  })
  STORE.set('read',readList);
  renderManage();renderPage();
}

function goFeed(url,type){
  currFeed = url;
  currTab = type;
  let btns = document.querySelectorAll('.top-bar .btn');
  btns.forEach(b=>b.classList.remove('active'));
  type==='img'?btns[0].classList.add('active'):btns[1].classList.add('active');
  if(currVideo){currVideo.pause();currVideo=null;}
  hideAllPanel();
  renderPage();
}

function showManage(){renderManage();document.getElementById('managePanel').classList.add('show')}
function renderManage(){
  let html='';
  const imgFeed = feeds.filter(f=>f.type==='img');
  const vidFeed = feeds.filter(f=>f.type==='video');
  if(imgFeed.length){
    html+=`<div class="feed-category">图片订阅</div>`;
    imgFeed.forEach(f=>{
      const num = allData.filter(d=>d.source===f.url&&!readList.includes(d.link)).length;
      html+=`<div class="feed-item">
        <div onclick="goFeed('${f.url}','img')">${f.name}<span class="badge">${num}</span></div>
        <div class="feed-buttons">
          <button class="btn btn-single" onclick="refreshSingleFeed('${f.url}')">刷新</button>
          <button class="btn" onclick="setAllRead('${f.url}')">全部已读</button>
          <button class="btn" onclick="delFeed('${f.url}')">删除</button>
        </div></div>`
    })
  }
  if(vidFeed.length){
    html+=`<div class="feed-category">视频订阅</div>`;
    vidFeed.forEach(f=>{
      const num = allData.filter(d=>d.source===f.url&&!readList.includes(d.link)).length;
      html+=`<div class="feed-item">
        <div onclick="goFeed('${f.url}','video')">${f.name}<span class="badge">${num}</span></div>
        <div class="feed-buttons">
          <button class="btn btn-single" onclick="refreshSingleFeed('${f.url}')">刷新</button>
          <button class="btn" onclick="setAllRead('${f.url}')">全部已读</button>
          <button class="btn" onclick="delFeed('${f.url}')">删除</button>
        </div></div>`
    })
  }
  document.getElementById('manageBox').innerHTML = html||'<div style="color:#999">暂无订阅</div>';
}

function showFav(){
  let html = '';
  favList.forEach((item,i)=>{
    let res = item.isImg ?
      (Array.isArray(item.res)?`<div class="img-wrap">${item.res.map(u=>`<div class="img-item"><img src="${u}"></div>`).join('')}</div>`:`<img src="${item.res}" style="width:100%;height:180px;object-fit:contain">`)
      :`<video controls style="width:100%;max-height:200px" src="${item.res}"></video>`;
    html+=`<div class="fav-item">${item.title}${res}<button class="btn" onclick="favList.splice(${i},1);STORE.set('fav',favList);showFav()">移除</button></div>`
  })
  document.getElementById('favBox').innerHTML = html||'<div style="color:#999">暂无收藏</div>';
  document.getElementById('favPanel').classList.add('show');
}

function addFav(link,title,res,isImg){
  if(favList.some(i=>i.link===link))return alert('已收藏');
  favList.push({link,title,res,isImg});
  STORE.set('fav',favList);alert('收藏成功');
}

async function loadAllRss(force=false){
  allData=[];
  for(const feed of feeds){
    const now=Date.now();
    const cache=RSS_CACHE.get(feed.url);
    if(!force&&cache&&now-cache.time<CACHE_TIME){allData.push(...cache.data);continue}
    let feedResult=[];
    try{
      const resp=await fetch(feed.url,{signal:AbortSignal.timeout(10000)});
      if(!resp.ok)throw '';
      const xml= new DOMParser().parseFromString(await resp.text(),'text/xml');
      const items=[...xml.querySelectorAll('item,entry')];
      items.forEach(it=>{
        const title=it.querySelector('title')?.textContent||'无标题';
        const link=it.querySelector('link')?.textContent||it.querySelector('link')?.href||'';
        const desc=it.querySelector('description,content\\:encoded,summary')?.textContent||'';
        const time=Date.parse(it.querySelector('pubDate,updated')?.textContent)||now;
        let src;
        if(feed.type==='img'){
          const imgs=desc.match(/<img[^>]+src=["']([^"']+)["']/gi);
          src=imgs?imgs.map(m=>m.match(/src=["']([^"']+)["']/i)[1]):[];
          feedResult.push({source:feed.url,title,link,res:src,isImg:true,pubTime:time});
        }else{
          src=desc.match(/https?:\/\/[^\s]+\.mp4/gi)?.[0]||'';
          feedResult.push({source:feed.url,title,link,res:src,isImg:false,pubTime:time});
        }
      })
      RSS_CACHE.set(feed.url,{data:feedResult,time:now});
      allData.push(...feedResult);
    }catch(e){
      try{
        const resp=await fetch(PROXY+encodeURIComponent(feed.url),{signal:AbortSignal.timeout(10000)});
        const xml= new DOMParser().parseFromString(await resp.text(),'text/xml');
        const items=[...xml.querySelectorAll('item,entry')];
        items.forEach(it=>{
          const title=it.querySelector('title')?.textContent||'无标题';
          const link=it.querySelector('link')?.textContent||it.querySelector('link')?.href||'';
          const desc=it.querySelector('description,content\\:encoded,summary')?.textContent||'';
          const time=Date.parse(it.querySelector('pubDate,updated')?.textContent)||now;
          let src;
          if(feed.type==='img'){
            const imgs=desc.match(/<img[^>]+src=["']([^"']+)["']/gi);
            src=imgs?imgs.map(m=>m.match(/src=["']([^"']+)["']/i)[1]):[];
            feedResult.push({source:feed.url,title,link,res:src,isImg:true,pubTime:time});
          }else{
            src=desc.match(/https?:\/\/[^\s]+\.mp4/gi)?.[0]||'';
            feedResult.push({source:feed.url,title,link,res:src,isImg:false,pubTime:time});
          }
        })
        RSS_CACHE.set(feed.url,{data:feedResult,time:now});
        allData.push(...feedResult);
      }catch(e2){alert(`【${feed.name}】加载失败`)}
    }
  }
  allData.sort((a,b)=>b.pubTime-a.pubTime);
  renderManage();renderPage();
}

// ========== 核心：滚动切换逻辑 ==========
wrap.addEventListener('scroll',()=>{
  clearTimeout(scrollLock);
  scrollLock=setTimeout(()=>{
    const h=wrap.clientHeight;
    const idx=Math.round(wrap.scrollTop/h);
    if(idx === nowIndex) return;

    // 1. 停掉上一个视频
    if(currVideo){
      currVideo.pause();
      currVideo=null;
    }

    // 2. 上一条标记已读 + 保存 + 刷新角标
    const prevItem = renderList[nowIndex];
    if(prevItem && !readList.includes(prevItem.link)){
      readList.push(prevItem.link);
      STORE.set('read',readList);
      renderManage();
    }

    // 3. 播放当前视频（JS触发，不静音）
    const targetV = wrap.children[idx]?.querySelector('video');
    if(targetV){
      currVideo = targetV;
      currVideo.play().catch(()=>{});
    }

    nowIndex = idx;
  },50)
})

// ========== 渲染：一次性全部渲染，不做懒加载 ==========
function renderPage(){
  if(currVideo){currVideo.pause();currVideo=null;}
  let arr = currFeed==='all'?[...allData]:allData.filter(d=>d.source===currFeed);
  arr = currTab==='img'?arr.filter(d=>d.isImg):arr.filter(d=>!d.isImg);
  renderList=arr.filter(d=>!readList.includes(d.link));

  wrap.innerHTML='';
  renderList.forEach((item,i)=>{
    const card=document.createElement('div');card.className='card';
    let dom;
    if(item.isImg){
      dom=Array.isArray(item.res)&&item.res.length?
        `<div class="img-wrap">${item.res.map(u=>`<div class="img-item"><img src="${u}" referrerpolicy="no-referrer"></div>`).join('')}</div>`
        :`<img class="media" src="${item.res}" referrerpolicy="no-referrer">`;
    }else{
      // 不写autoplay，全部由JS控制播放
      dom=item.res?`<video class="media" controls playsinline src="${item.res}"></video>`:`<div style="color:#aaa">无视频</div>`;
    }
    const tid='t_'+Math.random().toString(36).slice(3);
    card.innerHTML=`
    ${dom}
    <div class="title">
      <div id="${tid}" class="title-text">${item.title}</div>
      <button class="toggle-btn" onclick="const d=document.getElementById('${tid}');d.classList.toggle('expanded');this.innerText=d.classList.contains('expanded')?'收起':'展开'">展开</button>
    </div>
    <div class="actions"><button class="action-btn" onclick='addFav("${item.link}","${item.title}",${JSON.stringify(item.res)},${item.isImg})'>⭐</button></div>
    `;
    wrap.appendChild(card);
  })

  // 渲染完自动播放当前第一个
  setTimeout(()=>{
    const v=wrap.children[nowIndex]?.querySelector('video');
    if(v){currVideo=v;v.play().catch(()=>{});}
  },20)
}
</script>
</body>
</html>
