<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS TikTok Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            max-width: 480px;
            margin: 0 auto;
            padding: 10px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 20px;
        }
        .btn {
            background: #272727;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:active {
            opacity: 0.8;
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #1f1f1f;
            border-radius: 6px;
            font-size: 14px;
        }
        .tab.active {
            background: #3a3a3a;
            font-weight: bold;
        }
        .feed-item {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .feed-item h3 {
            font-size: 15px;
            margin-bottom: 5px;
        }
        .feed-item p {
            font-size: 13px;
            color: #ccc;
        }
        .feed-item img {
            width: 100%;
            border-radius: 6px;
            margin-top: 8px;
        }
        .unread-badge {
            display: inline-block;
            background: #f43f5e;
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .form-box {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
            background: #2b2b2b;
            color: #fff;
        }
        .form-box select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #2b2b2b;
            color: #fff;
            margin-bottom: 10px;
        }
        .tip {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <header>
        <h1>RSS 阅读器</h1>
        <button class="btn" onclick="showAddForm()">新建</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('list')">列表</div>
        <div class="tab" onclick="switchTab('manage')">管理</div>
    </div>

    <!-- 新增源表单 -->
    <div id="addForm" class="form-box" style="display:none;">
        <input id="feedName" placeholder="名称（如 测试）">
        <input id="feedUrl" placeholder="RSS 地址">
        <select id="feedType">
            <option value="image">图片模式</option>
            <option value="text">文本模式</option>
        </select>
        <button class="btn" style="width:100%" onclick="addFeed()">保存</button>
        <div class="tip">示例：https://n.sinaapp.com/feed</div>
    </div>

    <!-- 内容区 -->
    <div id="listView"></div>
    <div id="manageView" style="display:none;"></div>

    <script>
        // ------------------- 代理配置（已优化） -------------------
        const PROXY_LIST = [
            url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
            url => `https://cors-anywhere.herokuapp.com/${url}`
        ];
        let proxyIndex = 0;

        // 存储
        let feeds = JSON.parse(localStorage.getItem('rssFeeds')) || [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderList();
            renderManage();
        });

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('listView').style.display = tab === 'list' ? 'block' : 'none';
            document.getElementById('manageView').style.display = tab === 'manage' ? 'block' : 'none';
        }

        // 显示新增表单
        function showAddForm() {
            document.getElementById('addForm').style.display = 'block';
        }

        // 添加源
        function addFeed() {
            const name = document.getElementById('feedName').value.trim();
            const url = document.getElementById('feedUrl').value.trim();
            const type = document.getElementById('feedType').value;
            if (!name || !url) return alert('名称和地址不能为空');
            feeds.push({ name, url, type, unread: 0 });
            localStorage.setItem('rssFeeds', JSON.stringify(feeds));
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('feedName').value = '';
            document.getElementById('feedUrl').value = '';
            renderList();
            renderManage();
        }

        // 渲染列表
        function renderList() {
            const container = document.getElementById('listView');
            container.innerHTML = '';
            feeds.forEach((feed, idx) => {
                const div = document.createElement('div');
                div.className = 'feed-item';
                div.innerHTML = `
                    <h3>${feed.name} <span class="unread-badge">${feed.unread}</span></h3>
                    <p>加载中...</p>
                `;
                container.appendChild(div);
                loadFeed(idx, div);
            });
        }

        // 加载单个RSS
        async function loadFeed(feedIdx, dom) {
            const feed = feeds[feedIdx];
            const url = feed.url;
            const type = feed.type;
            let xml = null;

            // 双代理轮询
            for (let i = 0; i < PROXY_LIST.length; i++) {
                const proxy = PROXY_LIST[proxyIndex];
                proxyIndex = (proxyIndex + 1) % PROXY_LIST.length;
                try {
                    const res = await fetch(proxy(url), { signal: AbortSignal.timeout(10000) });
                    if (!res.ok) continue;
                    const data = await res.json();
                    xml = data.contents;
                    break;
                } catch (e) {
                    continue;
                }
            }

            if (!xml) {
                dom.innerHTML = `<h3>${feed.name}</h3><p style="color:#f43f5e;">加载失败/被跨域拦截</p>`;
                return;
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const items = doc.querySelectorAll('item');
            feeds[feedIdx].unread = items.length;
            localStorage.setItem('rssFeeds', JSON.stringify(feeds));

            let html = `<h3>${feed.name} <span class="unread-badge">${items.length}</span></h3>`;
            items.forEach(item => {
                const title = item.querySelector('title')?.textContent || '无标题';
                const link = item.querySelector('link')?.textContent || '';
                const desc = item.querySelector('description')?.textContent || '';
                const imgMatch = desc.match(/<img[^>]+src="([^"]+)"/);
                const img = imgMatch ? imgMatch[1] : '';

                if (type === 'image' && img) {
                    html += `<a href="${link}" target="_blank"><img src="${img}" alt=""></a>`;
                } else {
                    html += `<p><a href="${link}" target="_blank" style="color:#60a5fa;text-decoration:none;">${title}</a></p>`;
                }
            });
            dom.innerHTML = html;
        }

        // 渲染管理
        function renderManage() {
            const container = document.getElementById('manageView');
            container.innerHTML = '';
            feeds.forEach((feed, idx) => {
                const div = document.createElement('div');
                div.className = 'feed-item';
                div.innerHTML = `
                    <h3>${feed.name}</h3>
                    <p>${feed.url}</p>
                    <button class="btn" style="margin-top:8px;background:#991b1b;" onclick="delFeed(${idx})">删除</button>
                `;
                container.appendChild(div);
            });
        }

        // 删除源
        function delFeed(idx) {
            if (!confirm('确定删除？')) return;
            feeds.splice(idx, 1);
            localStorage.setItem('rssFeeds', JSON.stringify(feeds));
            renderList();
            renderManage();
        }
    </script>
</body>
</html>
