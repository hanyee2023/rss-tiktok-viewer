<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RSS 极速阅读器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#000;color:#fff}
.top-bar{
position:fixed;top:0;left:0;width:100%;background:#111;padding:10px;z-index:999;
display:flex;gap:8px;align-items:center;overflow-x:auto;white-space:nowrap;
box-shadow:0 2px 8px #0006
}
.btn{background:#ff6a00;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:bold;white-space:nowrap}
.btn.active{background:#ff9500}
.btn-refresh{background:#0099ff}
.badge{background:#fff;color:#ff6a00;font-size:12px;padding:2px 6px;border-radius:10px;min-width:20px;text-align:center;display:inline-block}

.swiper{
margin-top:60px;height:calc(100vh - 60px);overflow-y:scroll;
scroll-snap-type:y mandatory;scroll-snap-stop:always;-webkit-overflow-scrolling:touch
}
.card{
width:100vw;height:calc(100vh - 60px);scroll-snap-align:start;position:relative;
display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden
}
.media{width:100vw;height:100vh;object-fit:contain;background:#000}

.title{
position:absolute;bottom:80px;left:10px;right:10px;background:rgba(0,0,0,.8);
padding:12px;border-radius:8px;font-size:14px;display:flex;gap:8px;align-items:center
}
.title-text{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.title-text.expanded{white-space:normal}
.toggle-btn{color:#ff6a00;background:transparent;border:none;cursor:pointer;font-size:12px}

.actions{position:absolute;right:14px;bottom:150px;display:flex;flex-direction:column;gap:14px}
.action-btn{width:46px;height:46px;border-radius:50%;background:#ff6a00;border:none;color:#fff;font-size:20px}

.panel{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;padding:20px;display:none;overflow-y:auto}
.panel.show{display:block}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:8px;font-size:14px}
.feed-list{margin-top:14px;display:flex;flex-direction:column;gap:12px}
.feed-category{background:#ff6a00;padding:8px 12px;border-radius:8px;font-weight:bold;margin-bottom:6px}
.feed-item{background:#1a1a1a;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.feed-buttons{display:flex;gap:6px}
.fav-item{background:#222;padding:12px;border-radius:8px;margin:8px 0}
</style>
</head>
<body>
<div class="top-bar">
  <button class="btn active" onclick="switchTab('img',this)">图片</button>
  <button class="btn" onclick="switchTab('video',this)">视频</button>
  <button class="btn" onclick="showAdd()">新建</button>
  <button class="btn" onclick="showManage()">管理</button>
  <button class="btn" onclick="showFav()">收藏</button>
  <button class="btn" onclick="showIO()">导入导出</button>
  <button class="btn btn-refresh" onclick="clearCacheAndReload()">强制刷新</button>
</div>

<div class="swiper" id="wrap"></div>

<!--弹窗-->
<div class="panel" id="addPanel">
<h3>新增订阅</h3>
<input id="inName" placeholder="订阅名称">
<input id="inUrl" placeholder="RSS链接">
<select id="inType">
<option value="img">图片源</option>
<option value="video">MP4视频源</option>
</select>
<button class="btn" onclick="saveAdd()">保存</button>
<button class="btn" onclick="hideAllPanel()">关闭</button>
</div>
<div class="panel" id="editPanel">
<h3>编辑订阅</h3>
<input id="eName">
<input id="eUrl">
<select id="eType">
<option value="img">图片</option>
<option value="video">MP4视频</option>
</select>
<button class="btn" onclick="saveEdit()">保存</button>
<button class="btn" onclick="hideAllPanel()">关闭</button>
</div>
<div class="panel" id="managePanel"><div id="manageBox"></div><button class="btn" onclick="hideAllPanel()" style="margin-top:15px">关闭</button></div>
<div class="panel" id="favPanel"><div id="favBox"></div><button class="btn" onclick="hideAllPanel()">关闭</button></div>
<div class="panel" id="ioPanel">
<button class="btn" onclick="exportJson()">导出备份</button>
<textarea id="impJson" placeholder="粘贴JSON导入"></textarea>
<button class="btn" onclick="importJson()">导入数据</button>
<hr style="margin:15px 0;border-color:#333">
<textarea id="opmlTxt" placeholder="粘贴OPML"></textarea>
<input type="file" id="opmlFile" accept=".opml,.xml">
<button class="btn" onclick="parseOPML()">OPML导入</button>
<button class="btn" onclick="hideAllPanel()">关闭</button>
</div>

<script>
// 配置
const PROXY = "https://api.allorigins.win/raw?url=";
const RSS_CACHE = new Map();
const CACHE_TIME = 3*60*1000;
const STORE = {
  get(k){return JSON.parse(localStorage.getItem(k)||'[]')},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))}
}

// 全局数据
let feeds = STORE.get('feeds');
let readList = STORE.get('read');
let favList = STORE.get('fav');
let allData = [];
let currFeed = 'all';
let currTab = 'img';
let editOldUrl = '';
let nowIndex = 0;
let renderList = [];
let currVideo = null;
const wrap = document.getElementById('wrap');
let scrollLock = null;

window.onload = ()=>loadAllRss(true);

// 缓存全清+重载
function clearCacheAndReload(){
  RSS_CACHE.clear();
  loadAllRss(true);
  alert('已清空缓存重载');
}

// 切换图片/视频标签
function switchTab(t,dom){
  currTab = t;
  document.querySelectorAll('.top-bar .btn').forEach(b=>b.classList.remove('active'));
  dom.classList.add('active');
  renderPage();
}

// 新增订阅弹窗
function showAdd(){document.getElementById('addPanel').classList.add('show')}
function saveAdd(){
  const n = document.getElementById('inName').value.trim();
  const u = document.getElementById('inUrl').value.trim();
  const t = document.getElementById('inType').value;
  if(!n||!u)return alert('名称和链接不能为空');
  RSS_CACHE.delete(u);
  const idx = feeds.findIndex(i=>i.url===u);
  if(idx>-1) feeds[idx]={name:n,url:u,type:t};
  else feeds.push({name:n,url:u,type:t});
  STORE.set('feeds',feeds);
  hideAllPanel();
  loadAllRss(true);
}

// 编辑订阅
function editFeed(url){
  const item = feeds.find(i=>i.url===url);
  editOldUrl = url;
  document.getElementById('eName').value = item.name;
  document.getElementById('eUrl').value = item.url;
  document.getElementById('eType').value = item.type;
  document.getElementById('editPanel').classList.add('show');
}
function saveEdit(){
  const n = document.getElementById('eName').value.trim();
  const u = document.getElementById('eUrl').value.trim();
  const t = document.getElementById('eType').value;
  RSS_CACHE.delete(editOldUrl);
  RSS_CACHE.delete(u);
  const idx = feeds.findIndex(i=>i.url===editOldUrl);
  feeds[idx]={name:n,url:u,type:t};
  STORE.set('feeds',feeds);
  hideAllPanel();
  loadAllRss(true);
}

// 删除订阅：清空对应已读+删除源
function delFeed(url){
  readList = readList.filter(link=>{
    const d = allData.find(x=>x.link===link);
    return !(d&&d.source===url);
  })
  STORE.set('read',readList);
  feeds = feeds.filter(i=>i.url!==url);
  STORE.set('feeds',feeds);
  RSS_CACHE.delete(url);
  loadAllRss(true);
}

// 全部已读
function setAllRead(url){
  allData.forEach(d=>{
    if(d.source===url&&!readList.includes(d.link)) readList.push(d.link);
  })
  STORE.set('read',readList);
  renderManage();renderPage();
}

// 管理面板
function showManage(){renderManage();document.getElementById('managePanel').classList.add('show')}
function renderManage(){
  let html='';
  const imgFeed = feeds.filter(f=>f.type==='img');
  const vidFeed = feeds.filter(f=>f.type==='video');
  if(imgFeed.length){
    html += `<div class="feed-category">图片订阅</div>`;
    imgFeed.forEach(f=>{
      const num = allData.filter(d=>d.source===f.url&&!readList.includes(d.link)).length;
      html += `<div class="feed-item">
        <div onclick="currFeed='${f.url}';renderPage();hideAllPanel()">${f.name}<span class="badge">${num}</span></div>
        <div class="feed-buttons">
          <button class="btn" onclick="editFeed('${f.url}')">编辑</button>
          <button class="btn" onclick="setAllRead('${f.url}')">全部已读</button>
          <button class="btn" onclick="delFeed('${f.url}')">删除</button>
        </div></div>`
    })
  }
  if(vidFeed.length){
    html += `<div class="feed-category">视频订阅</div>`;
    vidFeed.forEach(f=>{
      const num = allData.filter(d=>d.source===f.url&&!readList.includes(d.link)).length;
      html += `<div class="feed-item">
        <div onclick="currFeed='${f.url}';renderPage();hideAllPanel()">${f.name}<span class="badge">${num}</span></div>
        <div class="feed-buttons">
          <button class="btn" onclick="editFeed('${f.url}')">编辑</button>
          <button class="btn" onclick="setAllRead('${f.url}')">全部已读</button>
          <button class="btn" onclick="delFeed('${f.url}')">删除</button>
        </div></div>`
    })
  }
  document.getElementById('manageBox').innerHTML = html||'<div style="color:#999">暂无订阅</div>';
}

// 关闭全部弹窗
function hideAllPanel(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'))
}

// 收藏面板
function showFav(){
  let html = '';
  favList.forEach((item,i)=>{
    let res = '';
    if(item.isImg) res = `<img src="${item.res}" class="media" style="height:180px;width:100%;object-fit:contain">`;
    else if(item.res) res = `<video controls style="width:100%;max-height:200px" src="${item.res}"></video>`;
    html += `<div class="fav-item">${item.title}${res}
    <button class="btn" onclick="openFav('${item.link}')">查看</button>
    <button class="btn" onclick="favList.splice(${i});STORE.set('fav',favList);showFav()">移除</button>
    </div>`
  })
  document.getElementById('favBox').innerHTML = html||'<div style="color:#999">暂无收藏</div>';
  document.getElementById('favPanel').classList.add('show');
}
// 打开收藏条目
function openFav(link){
  const d = allData.find(x=>x.link===link);
  if(!d)return;
  wrap.innerHTML='';
  const div = document.createElement('div');div.className='card';
  let dom = '';
  if(d.isImg) dom = `<img class="media" src="${d.res}">`;
  else if(d.res.includes('video.twimg.com')) dom = '<div style="color:#fff">无法播放推特源</div>';
  else dom = `<video class="media" controls src="${d.res}"></video>`;
  div.innerHTML = `${dom}<div class="title"><div>${d.title}</div></div>`;
  wrap.appendChild(div);hideAllPanel();
}
// 添加收藏
function addFav(link,title,res,isImg){
  if(favList.some(i=>i.link===link))return alert('已收藏');
  favList.push({link,title,res,isImg});
  STORE.set('fav',favList);alert('收藏成功');
}

// 导入导出
function showIO(){document.getElementById('ioPanel').classList.add('show')}
function exportJson(){
  const d = {feeds,read:readList,fav:favList};
  const s = JSON.stringify(d,null,2);
  navigator.clipboard.writeText(s).then(()=>alert('已复制'));
}
function importJson(){
  const s = document.getElementById('impJson').value.trim();
  try{
    const d = JSON.parse(s);
    if(confirm('覆盖现有数据？')){
      feeds=d.feeds||[];readList=d.read||[];favList=d.fav||[];
      STORE.set('feeds',feeds);STORE.set('read',readList);STORE.set('fav',favList);
      RSS_CACHE.clear();loadAllRss(true);hideAllPanel();alert('导入成功');
    }
  }catch{alert('JSON格式错误')}
}
// OPML导入
function parseOPML(){
  const file = document.getElementById('opmlFile').files[0];
  const txt = document.getElementById('opmlTxt').value.trim();
  function deal(str){
    const xml = new DOMParser().parseFromString(str,'text/xml');
    const list = [...xml.querySelectorAll('outline[xmlUrl]')];
    let add = [];
    list.forEach(el=>{
      const name = el.getAttribute('title')||el.getAttribute('text')||'未命名';
      const url = el.getAttribute('xmlUrl');
      if(url) add.push({name,url,type:'img'});
    })
    if(add.length&&confirm(`导入${add.length}个订阅？`)){
      feeds=[...feeds,...add];STORE.set('feeds',feeds);RSS_CACHE.clear();loadAllRss(true);hideAllPanel();
    }
  }
  if(file){const r=new FileReader();r.onload=e=>deal(e.target.result);r.readAsText(file)}
  else if(txt) deal(txt);
}

/** 核心：RSS解析，不再正则抓内容，item直接提取资源链接，图片/MP4单独存入res字段 **/
async function loadAllRss(force=false){
  allData = [];
  for(const feed of feeds){
    const now = Date.now();
    const cache = RSS_CACHE.get(feed.url);
    if(!force&&cache&&now-cache.time<CACHE_TIME){
      allData.push(...cache.data);continue;
    }
    try{
      const resp = await fetch(PROXY+encodeURIComponent(feed.url),{signal:AbortSignal.timeout(7000)});
      const xmlTxt = await resp.text();
      const xml = new DOMParser().parseFromString(xmlTxt,'text/xml');
      const items = [...xml.querySelectorAll('item,entry')];
      const tempArr = [];
      items.forEach(it=>{
        const title = it.querySelector('title')?.textContent||'无标题';
        const link = (it.tagName==='item'?it.querySelector('link')?.textContent:it.querySelector('link')?.href)||'';
        let src = '';
        // 【关键优化】源分类：图片源取第一个img直链、视频源取mp4直链，不解析多余正文
        if(feed.type==='img'){
          const desc = it.querySelector('description,content\\:encoded,summary')?.textContent||'';
          const reg = /<img[^>]+src=["']([^"']+)["']/i;
          const m = desc.match(reg);
          if(m) src = m[1];
          tempArr.push({source:feed.url,title,link,res:src,isImg:true});
        }else{
          // video源只保留mp4结尾链接，过滤推特无法播放
          const desc = it.querySelector('description,content\\:encoded,summary')?.textContent||'';
          const mp4Reg = /https?:\/\/[^\s"\']+\.mp4/i;
          const arr = desc.match(mp4Reg);
          if(arr) src = arr[0];
          tempArr.push({source:feed.url,title,link,res:src,isImg:!src.includes('.mp4')?true:false});
        }
      })
      RSS_CACHE.set(feed.url,{data:tempArr,time:now});
      allData.push(...tempArr);
    }catch(e){console.log(feed.name,'请求失败',e)}
  }
  renderManage();
  renderPage();
}

// 滚动防抖、切走视频立刻销毁防混音
wrap.addEventListener('scroll',()=>{
  clearTimeout(scrollLock);
  scrollLock = setTimeout(()=>{
    const h = wrap.clientHeight;
    const pos = wrap.scrollTop;
    const idx = Math.round(pos/h);
    if(Math.abs(idx-nowIndex)>1)return;
    // 标记已读
    if(idx>nowIndex){
      const d = renderList[nowIndex];
      if(d&&!readList.includes(d.link)){
        readList.push(d.link);STORE.set('read',readList);renderManage();
      }
    }
    nowIndex = idx;
    // 离开屏幕销毁视频
    if(currVideo){
      const rect = currVideo.getBoundingClientRect();
      if(rect.top>innerHeight||rect.bottom<0){
        currVideo.pause();currVideo.remove();currVideo=null;
      }
    }
  },60)
})

// 页面渲染：只过滤数据、直接渲染标签，无多余DOM嵌套
function renderPage(){
  if(currVideo){currVideo.pause();currVideo.remove();currVideo=null}
  // 筛选订阅
  let arr = currFeed==='all'?allData:allData.filter(d=>d.source===currFeed);
  // 筛选图片/视频
  if(currTab==='img') arr = arr.filter(d=>d.isImg&&d.res);
  else arr = arr.filter(d=>!d.isImg&&d.res);
  // 未读优先
  renderList = arr.filter(d=>!readList.includes(d.link));
  nowIndex = 0;
  wrap.innerHTML='';
  renderList.forEach(item=>{
    const card = document.createElement('div');card.className='card';
    let domStr = '';
    if(item.isImg){
      domStr = `<img class="media" loading="lazy" referrerpolicy="no-referrer" src="${item.res}">`;
    }else{
      if(item.res.includes('video.twimg.com')){
        domStr = `<div style="color:#fff">该推特MP4无法嵌入播放</div>`;
      }else{
        domStr = `<video class="media" controls preload="metadata" src="${item.res}" onplay="if(currVideo&&currVideo!==this){currVideo.pause();currVideo=null};currVideo=this"></video>`;
      }
    }
    // 标题折叠
    const tid = 't_'+Math.random().toString(36).slice(3);
    card.innerHTML = `
    ${domStr}
    <div class="title">
      <div id="${tid}" class="title-text">${item.title}</div>
      <button class="toggle-btn" onclick="const d=document.getElementById('${tid}');d.classList.toggle('expanded');this.innerText=d.classList.contains('expanded')?'收起':'展开'">展开</button>
    </div>
    <div class="actions"><button class="action-btn" onclick="addFav('${item.link}','${item.title}','${item.res}',${item.isImg})">⭐</button></div>
    `;
    wrap.appendChild(card);
  })
}
</script>
</body>
</html>
